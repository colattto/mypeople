<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plow — Priorities (TODO)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --midnight:#01000A; --volt:#D5EF8A; --grove:#5e7a5e; --iris:#C4BFFF;
  --dark-bg:#111110; --dark-border:rgba(255,255,255,0.09);
  --text-dark:#F0F0E8; --muted-dark:rgba(240,240,232,0.45);
  --success:#34c759; --danger:#ff3b30; --warning:#febc2e; --info:#5ac8fa;
  --volt-dim:rgba(213,239,138,0.15); --volt-glow:rgba(213,239,138,0.25);
  --surface:rgba(255,255,255,0.05); --surface2:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --serif:'Instrument Serif',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif; --mono:'DM Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--dark-bg);color:var(--text-dark);font-family:var(--sans);font-weight:300;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;z-index:9999}
.wrap{max-width:1200px;margin:0 auto;padding:48px 56px 80px;position:relative;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;gap:32px;padding-bottom:28px;border-bottom:1px solid var(--dark-border);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:18px}
.mark{width:56px;height:56px;border-radius:13px;background:var(--volt);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.mark span{font-family:var(--serif);font-size:38px;color:var(--grove);line-height:1}
h1{font-family:var(--serif);font-weight:400;font-size:clamp(34px,4vw,54px);letter-spacing:-.02em;line-height:1}
h1 em{font-style:italic;color:rgba(240,240,232,.55)}
.subt{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-dark);margin-top:6px}
.live-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--volt);background:rgba(213,239,138,.10);border:1px solid rgba(213,239,138,.45);padding:5px 13px;border-radius:100px;text-shadow:0 0 10px rgba(213,239,138,.28)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--volt);box-shadow:0 0 8px var(--volt);animation:pulse 1.6s ease-in-out infinite}
#clock{color:var(--text-dark);opacity:.84}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.counts{display:flex;gap:10px;margin-top:10px;font-family:var(--mono);font-size:12px;flex-wrap:wrap}
.counts span{padding:4px 12px;border-radius:100px;border:1px solid var(--dark-border);color:var(--muted-dark)}
.addbar{display:flex;gap:12px;margin:34px 0 14px;flex-wrap:wrap}
.addbar input{flex:1;min-width:280px;font-family:var(--sans);font-size:20px;color:var(--text-dark);background:var(--surface);border:1.5px solid var(--dark-border);border-radius:14px;padding:16px 20px;outline:none}
.addbar input:focus{border-color:var(--grove);box-shadow:0 0 0 3px rgba(94,122,94,.25)}
.btn-volt{font-family:var(--sans);font-weight:700;font-size:17px;color:var(--midnight);background:var(--volt);border:none;border-radius:14px;padding:0 32px;cursor:pointer;white-space:nowrap}
.btn-volt:hover{filter:brightness(1.06);box-shadow:0 4px 20px var(--volt-glow)}
.cnt-hidden{color:var(--iris)!important;border-color:rgba(196,191,255,.35)!important}
.viewbar{display:flex;align-items:center;justify-content:space-between;gap:18px 28px;flex-wrap:wrap;margin:18px 0 4px;padding:14px 0;border-top:1px solid var(--dark-border);border-bottom:1px solid var(--dark-border)}
.vb-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.vb-label{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted-dark);margin-right:3px}
.chip{font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.04em;border-radius:100px;padding:4px 11px;text-transform:uppercase;cursor:pointer;border:1px solid transparent;user-select:none;transition:filter .15s,opacity .15s}
.chip:hover{filter:brightness(1.12)}
.chip.off{background:transparent!important;color:var(--muted-dark)!important;border-color:var(--dark-border)!important;text-decoration:line-through;opacity:.55}
.vb-sep{width:1px;height:22px;background:var(--dark-border);margin:0 3px}
.vbtn{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--muted-dark);background:var(--surface);border:1px solid var(--dark-border);border-radius:9px;padding:5px 12px;cursor:pointer;text-transform:uppercase;transition:.15s}
.vbtn:hover{border-color:var(--volt);color:var(--volt)}
.vbtn.on{background:var(--volt-dim);border-color:var(--volt);color:var(--volt)}
ul{list-style:none}
.task{background:var(--surface);border:1px solid var(--dark-border);border-radius:18px;padding:20px 22px;margin-top:14px}
.task.fresh{animation:fadeUp .2s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.task.done{opacity:.6}
.task.cancelled{opacity:.5}
.task-top{display:flex;align-items:flex-start;gap:16px}
.check{width:38px;height:38px;flex-shrink:0;border-radius:11px;cursor:pointer;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;transition:.2s;color:#fff;font-weight:700}
.check:hover{border-color:var(--volt)}
.check.on{background:var(--success);border-color:var(--success)}
.check.disabled{opacity:.3;cursor:not-allowed}
.task-main{flex:1;min-width:0}
.task-text{font-family:var(--serif);font-size:clamp(22px,2.2vw,30px);line-height:1.15;letter-spacing:-.01em;word-break:break-word;cursor:text;outline:none}
.task-text:focus{box-shadow:0 2px 0 var(--grove)}
.task.done .task-text{text-decoration:line-through;color:var(--muted-dark)}
.task.cancelled .task-text{text-decoration:line-through;color:var(--muted-dark)}
.meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.04em;border-radius:100px;padding:3px 10px;text-transform:uppercase}
.st-needs_brainstorm{background:rgba(196,191,255,.18);color:var(--iris)}
.st-working{background:rgba(254,188,46,.18);color:var(--warning)}
.st-review{background:rgba(90,200,250,.16);color:var(--info)}
.st-blocked{background:rgba(255,59,48,.16);color:var(--danger)}
.st-done{background:rgba(52,199,89,.16);color:#52d873}
.st-cancelled{background:rgba(142,142,147,.18);color:var(--muted-dark)}
.unread-badge{font-family:var(--mono);font-weight:700;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--midnight);background:var(--volt);border:1px solid rgba(213,239,138,.7);border-radius:100px;padding:3px 9px;box-shadow:0 0 16px rgba(213,239,138,.24)}
.tag{font-family:var(--mono);font-size:11px;color:var(--muted-dark);border:1px solid var(--dark-border);border-radius:100px;padding:3px 10px}
/* click-the-linked-engineer → attach to its terminal (slice c) */
.tag.attach{cursor:pointer;color:var(--info);border-color:rgba(90,200,250,.4)}
.tag.attach::before{content:'⧉ ';opacity:.85}
.tag.attach:hover{color:var(--volt);border-color:var(--volt);background:var(--volt-dim)}
.row{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.field{font-family:var(--sans);font-size:14px;color:var(--text-dark);background:var(--surface);border:1px solid var(--dark-border);border-radius:10px;padding:9px 12px;outline:none;flex:1;min-width:220px}
.field:focus{border-color:var(--grove);box-shadow:0 0 0 2px rgba(94,122,94,.2)}
.label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-dark);min-width:120px}
.label.req::after{content:' *';color:var(--danger)}
.toggle{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--muted-dark);user-select:none}
.toggle.disabled{opacity:.4;cursor:not-allowed}
.sw{width:42px;height:24px;border-radius:100px;background:var(--surface2);border:1px solid var(--border2);position:relative;transition:.2s}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted-dark);transition:.2s}
.toggle.on .sw{background:var(--volt-dim);border-color:var(--volt)}
.toggle.on .sw::after{left:21px;background:var(--volt)}
.brainstorm{margin-top:10px;font-family:var(--sans);font-size:14px;line-height:1.5;color:var(--text-dark);background:rgba(196,191,255,.07);border-left:2px solid var(--iris);border-radius:0 8px 8px 0;padding:10px 14px}
.brainstorm .h{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--iris);display:block;margin-bottom:4px}
.status{margin-top:10px;font-family:var(--mono);font-size:12.5px;color:var(--warning);background:rgba(254,188,46,.08);border-radius:8px;padding:8px 12px}
.needbrain{margin-top:10px;font-family:var(--mono);font-size:12.5px;color:var(--iris);background:rgba(196,191,255,.1);border:1px solid rgba(196,191,255,.35);border-radius:8px;padding:9px 13px;font-weight:500}
.proofs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.proof-list{display:contents}
.proof{font-family:var(--mono);font-size:11px;color:var(--text-dark);background:var(--surface2);border:1px solid var(--dark-border);border-radius:8px;padding:6px 10px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;display:inline-block}
.proof.img{padding:3px}
.proof.img img{max-width:200px;max-height:140px;border-radius:6px;display:block}
.proof.vid{display:flex;flex-direction:column;gap:5px;padding:0;max-width:none;overflow:visible;white-space:normal;background:transparent;border:none}
.proof.vid video{width:380px;max-width:78vw;border-radius:10px;background:#000;display:block;border:1px solid var(--dark-border)}
.proof.vid .vcap{font-family:var(--mono);font-size:11px;color:var(--volt);text-decoration:none}
.proof.vid .vcap:hover{text-decoration:underline}
.proof.more{cursor:pointer;color:var(--volt);border-color:rgba(213,239,138,.45);background:rgba(213,239,138,.10);font-weight:700}
.proof.more:hover{border-color:var(--volt);background:var(--volt-dim)}
.ctrls{display:flex;gap:6px;flex-shrink:0}
.ictrl{min-width:34px;height:34px;padding:0 8px;border-radius:9px;cursor:pointer;background:transparent;border:1px solid var(--dark-border);color:var(--muted-dark);font-size:14px;display:flex;align-items:center;justify-content:center}
.ictrl:hover{border-color:var(--volt);color:var(--volt)}
.ictrl.del:hover{border-color:var(--danger);color:var(--danger)}
.empty{text-align:center;padding:70px 20px;font-family:var(--serif);font-style:italic;font-size:28px;color:var(--muted-dark)}
.ping{font-family:var(--mono);font-size:10px;color:var(--muted-dark)}
.task-open{margin-left:auto;cursor:pointer}
/* ── issue-style card view (slice b) ───────────────────────────────────────── */
.modal{position:fixed;inset:0;z-index:1000;display:none;background:rgba(1,0,10,.72);backdrop-filter:blur(4px);overflow-y:auto;padding:40px 20px}
.modal.show{display:block}
.card{max-width:820px;margin:0 auto;background:var(--dark-bg);border:1px solid var(--border2);border-radius:20px;box-shadow:0 30px 90px rgba(0,0,0,.6);overflow:hidden}
.card-hd{padding:26px 30px 22px;border-bottom:1px solid var(--dark-border);position:relative}
.card-close{position:absolute;top:18px;right:20px;width:36px;height:36px;border-radius:10px;border:1px solid var(--dark-border);background:transparent;color:var(--muted-dark);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.card-close:hover{border-color:var(--danger);color:var(--danger)}
.card-title{font-family:var(--serif);font-size:clamp(26px,3vw,38px);line-height:1.1;letter-spacing:-.01em;padding-right:48px;word-break:break-word}
.card-sub{display:flex;align-items:center;gap:9px;margin-top:13px;flex-wrap:wrap}
.card-id{font-family:var(--mono);font-size:11px;color:var(--muted-dark)}
.card-statusrow{display:flex;align-items:center;gap:9px;margin-top:14px}
.card-statuslbl{font-family:var(--mono);font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted-dark)}
.card-state{font-family:var(--mono);font-size:12px;color:var(--text-dark);background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:6px 12px;cursor:pointer;outline:none}
.card-state:hover{border-color:var(--volt)}
.card-state:focus{border-color:var(--grove);box-shadow:0 0 0 2px rgba(94,122,94,.2)}
.card-cond{margin-top:16px;font-family:var(--sans);font-size:15px;line-height:1.5;color:var(--text-dark);background:var(--surface);border:1px solid var(--dark-border);border-radius:12px;padding:13px 16px}
.card-cond .h,.card-art .h{font-family:var(--mono);font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted-dark);display:block;margin-bottom:6px}
.card-art{margin:14px 30px 0;font-family:var(--sans);font-size:14.5px;line-height:1.55;color:var(--text-dark);background:rgba(196,191,255,.08);border:1px solid rgba(196,191,255,.3);border-left:3px solid var(--iris);border-radius:0 12px 12px 0;padding:14px 18px;white-space:pre-wrap;word-break:break-word}
/* relations: blocked-by deps + subtask progress (issue #3) — board card chips */
.rel{font-family:var(--mono);font-size:10px;letter-spacing:.03em;border-radius:100px;padding:2px 8px;display:inline-block}
.rel.blocked{background:rgba(255,59,48,.16);color:var(--danger)}
.rel.subs{background:rgba(90,200,250,.14);color:var(--info)}
.rel.child{background:rgba(196,191,255,.14);color:var(--iris)}
/* relations panel inside the opened card (issue #3) */
.card-rel{margin:14px 30px 0;border:1px solid var(--dark-border);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.rel-sec .h{font-family:var(--mono);font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted-dark);display:block;margin-bottom:8px}
.rel-row{display:flex;align-items:center;gap:9px;padding:5px 0}
.rel-link{font-family:var(--sans);font-size:14px;color:var(--text-dark);cursor:pointer;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}
.rel-link:hover{color:var(--volt)}
.rel-del{font-family:var(--mono);font-size:12px;color:var(--muted-dark);border:1px solid var(--dark-border);background:transparent;border-radius:7px;width:24px;height:24px;cursor:pointer;flex-shrink:0}
.rel-del:hover{border-color:var(--danger);color:var(--danger)}
.rel-add{display:flex;gap:8px;margin-top:8px}
.rel-add input,.rel-add select{flex:1;min-width:0;font-family:var(--sans);font-size:13px;color:var(--text-dark);background:var(--dark-bg);border:1.5px solid var(--dark-border);border-radius:9px;padding:8px 11px;outline:none}
.rel-add input:focus,.rel-add select:focus{border-color:var(--iris)}
.rel-add button{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--midnight);background:var(--iris);border:none;border-radius:9px;padding:0 14px;cursor:pointer;white-space:nowrap}
.rel-add button:hover{filter:brightness(1.07)}
.rel-gate{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--text-dark)}
.rel-gate .gate-hint{color:var(--muted-dark);font-size:11px}
.rel-empty{font-family:var(--sans);font-style:italic;font-size:13px;color:var(--muted-dark)}
.card-art .h{color:var(--iris)}
/* brainstorm gate — interactive Q&A (slice d) */
.card-qa{margin:14px 30px 0;border:1px solid rgba(196,191,255,.32);border-radius:14px;overflow:hidden}
.qa-banner{font-family:var(--mono);font-size:12px;letter-spacing:.02em;padding:11px 16px;display:flex;align-items:center;gap:9px}
.qa-banner.blocked{background:rgba(196,191,255,.12);color:var(--iris)}
.qa-banner.ready{background:rgba(52,199,89,.12);color:#52d873}
.qa-list{padding:6px 16px 14px;display:flex;flex-direction:column;gap:14px}
.qa-item .q{font-family:var(--sans);font-size:15px;line-height:1.45;color:var(--text-dark);margin-bottom:7px}
.qa-item .q::before{content:'Q';font-family:var(--mono);font-weight:700;font-size:11px;color:var(--iris);background:rgba(196,191,255,.18);border-radius:6px;padding:2px 7px;margin-right:9px}
.qa-ans-row{display:flex;gap:8px;align-items:flex-start}
.qa-ans-row textarea{flex:1;font-family:var(--sans);font-size:14px;line-height:1.45;color:var(--text-dark);background:var(--dark-bg);border:1.5px solid var(--dark-border);border-radius:10px;padding:9px 12px;outline:none;resize:vertical;min-height:42px}
.qa-ans-row textarea:focus{border-color:var(--iris);box-shadow:0 0 0 2px rgba(196,191,255,.22)}
.qa-ans-btn{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--midnight);background:var(--iris);border:none;border-radius:10px;padding:0 15px;cursor:pointer;align-self:stretch;white-space:nowrap}
.qa-ans-btn:hover{filter:brightness(1.07)}
.qa-item.answered .qa-ans{font-family:var(--sans);font-size:14px;line-height:1.45;color:var(--text-dark);background:rgba(52,199,89,.08);border-left:2px solid var(--success);border-radius:0 8px 8px 0;padding:8px 12px}
.qa-item.answered .qa-ans::before{content:'✓ ';color:var(--success);font-weight:700}
.qa-promote{font-family:var(--sans);font-weight:700;font-size:14px;color:var(--midnight);background:var(--volt);border:none;border-radius:10px;padding:10px 18px;cursor:pointer;margin:0 16px 14px}
.qa-promote:hover{filter:brightness(1.06)}
.thread{padding:8px 30px 22px}
.tl-empty{font-family:var(--serif);font-style:italic;color:var(--muted-dark);text-align:center;padding:28px 10px}
.ev{display:flex;gap:13px;padding:15px 0;border-bottom:1px solid var(--dark-border)}
.ev:last-child{border-bottom:none}
.av{width:34px;height:34px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px;background:var(--surface2);color:var(--text-dark)}
.av.ceo{background:var(--volt);color:var(--grove)}
.av.agent{background:rgba(90,200,250,.2);color:var(--info)}
.av.brain{background:rgba(196,191,255,.22);color:var(--iris)}
.ev-body{flex:1;min-width:0}
.ev-hd{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.ev-by{font-family:var(--mono);font-weight:500;font-size:12.5px;color:var(--text-dark)}
.ev-kind{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-dark);border:1px solid var(--dark-border);border-radius:100px;padding:1px 8px}
.ev-time{font-family:var(--mono);font-size:11px;color:var(--muted-dark)}
.ev-text{font-family:var(--sans);font-size:14.5px;line-height:1.55;color:var(--text-dark);white-space:pre-wrap;word-break:break-word}
.ev.brainstorm .ev-text{background:rgba(196,191,255,.07);border-radius:8px;padding:10px 13px}
/* state-transition: compact centered timeline marker, no avatar */
.ev.state{padding:9px 0;border-bottom:none;justify-content:center;gap:8px;align-items:center}
.ev.state .ev-text{font-family:var(--mono);font-size:11.5px;color:var(--muted-dark);background:var(--surface);border:1px solid var(--dark-border);border-radius:100px;padding:4px 13px;white-space:nowrap}
.ev-proofs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:flex-start}
/* opened-card attachments render FULL-WIDTH & uncropped — the 200×140 cap is only for the small
   board-card thumbnails (.proofs), never the opened issue card. Each media takes its own row. */
.ev-proofs .proof.img{flex:1 1 100%;max-width:100%;padding:0;background:transparent;border:none;overflow:visible;white-space:normal;display:block}
.ev-proofs .proof.img img{max-width:100%;width:auto;max-height:78vh;height:auto;object-fit:contain;border-radius:10px;border:1px solid var(--dark-border)}
.ev-proofs .proof.vid{flex:1 1 100%;max-width:100%}

<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">
        <div class="mark"><span>P</span></div>
        <div><h1>Priorities</h1><div class="subt">Boss source-of-truth · MyPeople</div></div>
      </div>
      <div class="counts" id="counts"></div>
    </div>
    <div style="text-align:right">
      <span class="live-pill"><span class="live-dot"></span><span id="conn">live</span></span>
      <div class="subt" id="clock" style="margin-top:8px">—</div>
    </div>
  </header>
  <div class="addbar">
    <input id="newItem" type="text" placeholder="Add a priority and hit Enter…" autocomplete="off">
    <button class="btn-volt" id="addBtn">Add</button>
  </div>
  <div class="viewbar">
    <div class="vb-group">
      <span class="vb-label">show</span>
      <span id="showChips" style="display:contents"></span>
      <span class="vb-sep"></span>
      <button class="vbtn" data-preset="all">all</button>
      <button class="vbtn" data-preset="hide-done">hide done</button>
      <button class="vbtn" data-preset="only-done">only done</button>
      <span class="vb-sep"></span>
      <button class="vbtn" data-toggle="unread" title="show only cards with a new, unread update — opening one clears it">unread only</button>
    </div>
  </div>
  <ul id="list"></ul>
</div>

<!-- issue-style card view (slice b): full message history + proofs + brainstorm artifact -->
<div class="modal" id="cardModal">
  <div class="card" id="cardInner">
    <div class="card-hd">
      <button class="card-close" id="cardClose" title="close (Esc)">×</button>
      <div class="card-title" id="cardTitle"></div>
      <div class="card-sub" id="cardSub"></div>
      <div class="card-statusrow"><span class="card-statuslbl">move to</span><select class="card-state" id="cardState"></select></div>
      <div class="card-cond" id="cardCond" style="display:none"><span class="h">done-condition</span><span id="cardCondBody"></span></div>
    </div>
    <div class="card-qa" id="cardQa" style="display:none"></div>
    <div class="card-art" id="cardArt" style="display:none"><span class="h">brainstorm artifact</span><span id="cardArtBody"></span></div>
    <div class="card-rel" id="cardRel" style="display:none"></div>
    <div class="thread" id="cardThread"></div>
    <div class="composer">
      <textarea id="cardCompose" placeholder="Leave a comment as CEO…"></textarea>
      <div class="crow">
        <span class="chint">⌘/Ctrl + Enter to comment</span>
        <div class="cbtns">
          <button class="cbtn primary" id="cardCommentBtn">Comment</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SECRET="__QUEUE_SECRET__";
const BUILD="__BUILD__";   // server stamps the HTML mtime; if a newer board ships, the open page auto-reloads (no stale-JS bugs)
const listEl=document.getElementById('list'), input=document.getElementById('newItem');
let board={version:"v2",order:[],tasks:{}};
const els={};                         // task id -> <li> (with li._r cached child refs)
const HOME_MEDIA_PREVIEW_LIMIT=3;
const READ_KEY='todoCeoRead.v1', READ_SEEDED_KEY='todoCeoReadSeeded.v1';
let readState={};
try{ readState=JSON.parse(localStorage.getItem(READ_KEY)||'{}')||{}; }catch(e){ readState={}; }
let readSeeded=localStorage.getItem(READ_SEEDED_KEY)==='1';

const H=()=>({'Content-Type':'application/json',...(SECRET?{'X-Queue-Secret':SECRET}:{})});
async function api(path,body){const r=await fetch(path,{method:'POST',headers:H(),body:JSON.stringify(body)});return r.json();}
const upd=b=>api('/todo/update',b), statusApi=b=>api('/todo/status',b), brainstormApi=b=>api('/todo/brainstorm',b), proofApi=b=>api('/todo/proof',b), commentApi=b=>api('/todo/comment',b), answerApi=b=>api('/todo/answer',b);
const STLABEL={needs_brainstorm:'needs brainstorm',working:'working',review:'review (CEO)',blocked:'blocked',done:'done',cancelled:'cancelled'};

// ── CLICK-THE-LINKED-ENGINEER → ATTACH (slice c) ─────────────────────────────
// Open the assignee's live terminal in a new tab via ttyd — the SAME effect as the HUD
// attach. The server resolves the tmux target (mc-<session>:<tab>) + the host's ttyd base
// from the queue /clients; we assemble the URL with the SAME `<location.hostname>:7681`
// fallback the HUD uses when a host advertises no attach_base (the local node).
async function attachToEngineer(agent){
  if(!agent) return;
  try{
    const r=await fetch('/todo/attach?agent='+encodeURIComponent(agent),{headers:H()});
    const d=await r.json();
    if(!d.ok){ alert(d.error||'cannot attach to this assignee'); return; }
    const base=d.base || ('http://'+(location.hostname||'127.0.0.1')+':7681');
    window.open(base+'/?arg=-t&arg='+encodeURIComponent(d.target),'_blank','noopener');
  }catch(e){ alert('attach failed: '+e); }
}
// an assignee is attachable iff it carries a tmux session:tab (host/session:tab or session:tab)
function isAttachable(asg){ return !!asg && /:[^:/]+$/.test(asg) && /(^|\/)[^/:]+:[^/:]+$/.test(asg); }
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── VIEW LAYER: filter by status (client-only; NEVER mutates board.order) ──
// Pure presentation. The durable store, manual order, cron & watchdog are untouched —
// this only decides which cards show. Cards always render in the CEO's manual board order.
// Persisted in localStorage.
const STATES=['needs_brainstorm','working','review','blocked','done','cancelled'];
let view={hidden:new Set(),unreadOnly:false};   // hidden: states to hide; unreadOnly: show only cards with a new (unread) update
try{ const v=JSON.parse(localStorage.getItem('todoView')||'{}');
     if(Array.isArray(v.hidden)) view.hidden=new Set(v.hidden.filter(s=>STATES.includes(s)));
     if(typeof v.unreadOnly==='boolean') view.unreadOnly=v.unreadOnly; }catch(e){}
function saveView(){ try{localStorage.setItem('todoView',JSON.stringify({hidden:[...view.hidden],unreadOnly:view.unreadOnly}));}catch(e){} }

// apply current filter to an ordered id list -> visible ids in manual board order.
function applyView(ids){
  let v=ids.filter(id=>!view.hidden.has(board.tasks[id].state));
  if(view.unreadOnly) v=v.filter(id=>unreadCount(board.tasks[id])>0);   // reuse the SAME unread definition as the 'N new' badge — no separate notion of unread
  return v;
}

// build the per-status toggle chips once, wire up all view controls
function initViewbar(){
  const wrap=document.getElementById('showChips');
  wrap.innerHTML=STATES.map(s=>`<span class="chip st-${s}" data-st="${s}">${esc(STLABEL[s]||s)}</span>`).join('');
  wrap.querySelectorAll('.chip').forEach(c=>{
    c.onclick=()=>{ const s=c.dataset.st; view.hidden.has(s)?view.hidden.delete(s):view.hidden.add(s); saveView(); renderViewbar(); reconcile(); };
  });
  document.querySelectorAll('.viewbar [data-preset]').forEach(b=>{
    b.onclick=()=>{ const p=b.dataset.preset;
      if(p==='all') view.hidden=new Set();
      else if(p==='hide-done') view.hidden=new Set(['done']);
      else if(p==='only-done') view.hidden=new Set(STATES.filter(s=>s!=='done'));
      saveView(); renderViewbar(); reconcile(); };
  });
  document.querySelectorAll('.viewbar [data-toggle="unread"]').forEach(b=>{
    b.onclick=()=>{ view.unreadOnly=!view.unreadOnly; saveView(); renderViewbar(); reconcile(); };
  });
}
function renderViewbar(){
  document.querySelectorAll('#showChips .chip').forEach(c=>c.classList.toggle('off', view.hidden.has(c.dataset.st)));
  const unb=document.querySelector('.viewbar [data-toggle="unread"]');   // live count so the CEO can jump straight to unread cards
  if(unb){ unb.classList.toggle('on', view.unreadOnly);
    let n=0; const ord=(board&&board.order)||[];
    ord.forEach(id=>{ const t=board.tasks[id]; if(t&&unreadCount(t)>0) n++; });
    const lbl = n ? `unread only · ${n}` : 'unread only';
    if(unb.textContent!==lbl) unb.textContent=lbl;
  }
}

// ── DIRTY FIELDS ARE SACRED ───────────────────────────────────────────────
// A field is sacred if it's focused OR has unsaved local edits (data-dirty=1).
// The poll never overwrites a sacred field; local typing wins until committed.
function isDirty(el){ return !!el && (el===document.activeElement || el.dataset.dirty==='1'); }
function watchDirty(el){ el.addEventListener('input',()=>{el.dataset.dirty='1';}); }
function clearDirty(el){ el.dataset.dirty=''; }
function setClean(el,val){ if(isDirty(el))return; if(el.value!==val) el.value=val; }              // <input>
function setCleanText(el,val){ if(isDirty(el))return; if(el.textContent!==val) el.textContent=val; } // contenteditable
function show(el,on){ el.style.display = on?'':'none'; }
function saveReadState(){ try{localStorage.setItem(READ_KEY,JSON.stringify(readState));}catch(e){} }
function isCeoActor(by){ return (by||'').trim().toLowerCase()==='ceo'; }
// ── relations (issue #3): parent/child + 'blocked by' dependencies ──
const isTerminal=s=>s==='done'||s==='cancelled';
function childrenOf(id){ return board.order.map(x=>board.tasks[x]).filter(t=>t&&t.parent===id); }
function unmetDeps(t){ return (t.dependsOn||[]).filter(id=>{const x=board.tasks[id]; return x && !isTerminal(x.state);}); }
function taskTitle(t){ return (t&&(t.text||'').trim())||'(untitled)'; }
function shortTitle(t){ const s=taskTitle(t); return s.length>60?s.slice(0,57)+'…':s; }
function taskUpdateEvents(t){
  const items=[];
  (t.comments||[]).forEach(c=>{ if(!isCeoActor(c.by)) items.push({ts:c.ts||0}); });
  (t.proofs||[]).forEach(p=>{ if(!isCeoActor(p.by)) items.push({ts:p.ts||0}); });
  return items;
}
function latestUpdateTs(t){ return Math.max(0,...taskUpdateEvents(t).map(e=>e.ts||0)); }
function unreadCount(t){
  const last=Number(readState[t.id]||0);
  return taskUpdateEvents(t).filter(e=>(e.ts||0)>last).length;
}
function markTaskRead(id){
  const t=board.tasks[id]; if(!t)return;
  const latest=latestUpdateTs(t);
  if(latest>(Number(readState[id]||0))){
    readState[id]=latest; saveReadState();
    if(els[id]) syncTask(els[id],t);
  }
}
function seedReadBaselines(ids){
  if(readSeeded) return;
  ids.forEach(id=>{ const t=board.tasks[id]; if(t && readState[id]===undefined) readState[id]=latestUpdateTs(t); });
  readSeeded=true; saveReadState();
  try{ localStorage.setItem(READ_SEEDED_KEY,'1'); }catch(e){}
}

// ── live poll: fetch board, reconcile only the delta. NO page reload. ──────
async function pull(){
  try{
    const r=await fetch('/todo/board',{headers:H()});
    if(!r.ok){ document.getElementById('conn').textContent=(r.status===403?'auth':'offline'); return; }
    const nb=await r.json();
    if(nb.build && BUILD!=='__BUILD__' && nb.build!==BUILD){ location.reload(); return; }   // a newer board shipped -> reload to the latest JS
    board=nb; document.getElementById('conn').textContent='live'; reconcile();
    if(!_hashChecked){ _hashChecked=true; checkHash(); }   // deep link present at load -> open that card (hashchange doesn't fire on initial load)
  }catch(e){ document.getElementById('conn').textContent='offline'; }
}

function reconcile(){
  const ids=board.order.filter(id=>board.tasks[id]);        // every real card, in manual order
  seedReadBaselines(ids);
  let done=0; ids.forEach(id=>{if(board.tasks[id].state==='done')done++;});
  const viewIds=applyView(ids);                             // filtered + sorted view (client-only)
  const hidden=ids.length-viewIds.length;
  document.getElementById('counts').innerHTML=
    `<span>${done} done</span><span>${ids.length-done} open</span><span>${ids.length} total</span>`+
    (hidden?`<span class="cnt-hidden">${hidden} hidden</span>`:'');   // subtle count chip; the 'all' preset clears filters
  renderViewbar();
  if(!ids.length){ if(!listEl.querySelector('.empty')) listEl.innerHTML='<li class="empty">Nada ainda. Adiciona a primeira prioridade acima.</li>'; for(const k in els) delete els[k]; return; }
  const baseEmpty=listEl.querySelector('.empty:not(.filtered)'); if(baseEmpty) baseEmpty.remove();
  const sy=window.scrollY, active=document.activeElement;
  // create + update in place (every card is kept synced, even if filtered out)
  ids.forEach(id=>{ try{ let li=els[id]; if(!li){ li=createTask(id); els[id]=li; listEl.appendChild(li); li.classList.add('fresh'); } syncTask(li, board.tasks[id]); }
    catch(e){ console.error('render error on card',id,e); } });   // one bad card must NEVER blank the whole board
  // remove gone
  for(const id in els){ if(!board.tasks[id]){ els[id].remove(); delete els[id]; } }
  // filter: show only cards in the view; hidden cards stay in the DOM but display:none
  const visible=new Set(viewIds);
  ids.forEach(id=>{ els[id].style.display = visible.has(id)?'':'none'; });
  // "nothing matches" message when the filter hides everything
  let fe=listEl.querySelector('.empty.filtered');
  if(!viewIds.length){ if(!fe){ fe=document.createElement('li'); fe.className='empty filtered'; fe.textContent='No cards match this filter.'; listEl.appendChild(fe); } }
  else if(fe){ fe.remove(); fe=null; }
  // reorder DOM only if it actually changed: visible (sorted) first, then hidden cards
  const target=[...viewIds, ...ids.filter(id=>!visible.has(id))];
  const cur=[...listEl.children].map(n=>n.dataset.id).filter(Boolean);
  if(cur.join(',')!==target.join(',')) target.forEach(id=>listEl.appendChild(els[id]));
  if(fe) listEl.appendChild(fe);                            // keep the filter-empty notice last
  // preserve focus + scroll across the tick
  if(active && document.contains(active) && document.activeElement!==active){ try{active.focus({preventScroll:true});}catch(e){} }
  if(window.scrollY!==sy) window.scrollTo(0,sy);
  if(cardOpenId) renderCard();    // stream new activity into the open card (composer untouched)
}

function createTask(id){
  const li=document.createElement('li'); li.className='task'; li.dataset.id=id;
  li.innerHTML=`
    <div class="task-top">
      <div class="check" title=""></div>
      <div class="task-main">
        <div class="task-text" contenteditable="true" spellcheck="false"></div>
        <div class="meta"><span class="badge"></span><span class="unread-badge" style="display:none"></span><span class="tag asg-tag"></span><span class="badge st-done ver" style="display:none">verified</span><span class="rels"></span><span class="ping"></span></div>
      </div>
      <div class="ctrls"><button class="ictrl open" title="open card — full history">⤢</button><button class="ictrl up">↑</button><button class="ictrl down">↓</button><button class="ictrl del">×</button></div>
    </div>
    <div class="row"><span class="label req">done-condition</span><input class="field cond" placeholder="how do we verify this is DONE?"></div>
    <div class="row"><label class="toggle"><span class="sw"></span>work to done</label></div>
    <div class="needbrain" style="display:none">⚠ Needs brainstorm — not workable until promoted. Answer the open question(s), then it moves to working.</div>
    <div class="brainstorm" style="display:none"><span class="h">brainstorm</span><span class="bs-body"></span></div>
    <div class="status" style="display:none"></div>
    <div class="proofs"><span class="proof-list"></span></div>`;
  const r={ check:li.querySelector('.check'), text:li.querySelector('.task-text'), badge:li.querySelector('.badge'),
    unread:li.querySelector('.unread-badge'), asgTag:li.querySelector('.asg-tag'), ver:li.querySelector('.ver'), ping:li.querySelector('.ping'), rels:li.querySelector('.rels'),
    cond:li.querySelector('.cond'), toggle:li.querySelector('.toggle'),
    brain:li.querySelector('.brainstorm'), bsBody:li.querySelector('.bs-body'), status:li.querySelector('.status'), needbrain:li.querySelector('.needbrain'),
    proofList:li.querySelector('.proof-list'), up:li.querySelector('.up'), down:li.querySelector('.down'), del:li.querySelector('.del'),
    open:li.querySelector('.open'), psig:null };
  li._r=r;
  const T=()=>board.tasks[id];
  // text (contenteditable)
  watchDirty(r.text);
  r.text.onblur=()=>{ const v=r.text.textContent.trim(); clearDirty(r.text); const t=T(); if(t&&v&&v!==t.text) upd({op:'set',id,text:v}).then(pull); };
  r.text.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault(); r.text.blur();} };
  // check toggle done/undone
  r.check.onclick=e=>{ e.stopPropagation();              // CEO mark-done — must NOT bubble to the card-open handler
    const t=T(); if(!t)return;
    // Rule 21: the CEO marks done in ONE click from ANY state (the verify/review gate is only for the AI).
    if(t.state==='done') statusApi({id,state:'working',verified:false,by:'CEO'}).then(pull);   // un-done
    else statusApi({id,state:'done',verified:true,by:'CEO'}).then(pull); };                     // -> done, one click, any state
  // done-condition
  watchDirty(r.cond);
  r.cond.onblur=()=>{ const t=T(); clearDirty(r.cond); if(t&&r.cond.value!==t.doneCondition) upd({op:'set',id,doneCondition:r.cond.value}).then(pull); };
  r.cond.onkeydown=e=>{ if(e.key==='Enter') r.cond.blur(); };
  // work-to-done toggle
  // work-to-done: DEBOUNCED 500ms — rapid on/off settles to ONE final POST; if it nets back to the
  // current server state, nothing is sent (no duplicate Boss notification).
  r.toggle.onclick=()=>{ const t=T(); if(!t||!(t.doneCondition||'').trim())return;
    if(r._pendWtd===undefined) r._pendWtd=!!t.workToDone;
    r._pendWtd=!r._pendWtd;
    r.toggle.classList.toggle('on', r._pendWtd);            // immediate visual feedback
    clearTimeout(r._wtdTimer);
    r._wtdTimer=setTimeout(()=>{ const cur=T(), want=r._pendWtd; r._pendWtd=undefined;
      if(cur && want!==!!cur.workToDone) upd({op:'set',id,workToDone:want}).then(pull);   // only the net change fires
      else pull();                                          // no net change -> resync, send nothing
    }, 500);
  };
  // click the linked-engineer chip -> attach to its terminal (don't also open the card)
  r.asgTag.onclick=e=>{ const t=T(); if(t&&isAttachable(t.assignee)){ e.stopPropagation(); attachToEngineer(t.assignee); } };
  // reorder / delete
  r.up.onclick=()=>move(id,-1); r.down.onclick=()=>move(id,1);
  r.del.onclick=()=>{ if(confirm('Delete this priority?')) upd({op:'del',id}).then(pull); };
  // open the issue-style card (explicit ⤢, or click the card body away from any control)
  r.open.onclick=e=>{ e.stopPropagation(); openCard(id); };
  li.addEventListener('click',e=>{ if(e.target.closest('input,textarea,button,a,label,video,[contenteditable],.check,.ctrls,.proofs,.toggle')) return; openCard(id); });
  return li;
}

function proofChip(p){
  if(p.type==='image') return `<a class="proof img" href="${esc(p.ref)}" target="_blank" title="${esc(p.caption||'image')}"><img src="${esc(p.ref)}" loading="lazy" alt="proof"></a>`;
  if(p.type==='video') return `<div class="proof vid"><video class="pvid" controls preload="metadata" playsinline src="${esc(p.ref)}"></video>`
      + `<a class="vcap" href="${esc(p.ref)}" target="_blank">▶ ${esc(p.caption||'watch proof')} ↗</a></div>`;
  if(p.type==='link')  return `<a class="proof" href="${esc(p.ref)}" target="_blank">🔗 ${esc(p.ref)}</a>`;
  return `<span class="proof" title="${esc(p.ref)}">📝 ${esc(p.ref)}</span>`;
}
function isMediaProof(p){ return p && (p.type==='image'||p.type==='video'); }
function homeProofsHtml(proofs){
  const ps=proofs||[], media=ps.filter(isMediaProof);
  const shownMedia=new Set(media.slice(0,HOME_MEDIA_PREVIEW_LIMIT).map(p=>p.id));
  let html=ps.filter(p=>!isMediaProof(p)||shownMedia.has(p.id)).map(proofChip).join('');
  const hidden=media.length-HOME_MEDIA_PREVIEW_LIMIT;
  if(hidden>0) html+=`<button type="button" class="proof more" title="open card to view all ${media.length} media attachments">+${hidden} more</button>`;
  return html;
}

function syncTask(li,t){
  const r=li._r;
  li.classList.toggle('done', t.state==='done');
  li.classList.toggle('cancelled', t.state==='cancelled');
  // the CEO can mark done from ANY state (Rule 21, one click) -> the check is always enabled
  r.check.classList.toggle('on', t.state==='done');
  r.check.classList.remove('disabled');
  r.check.textContent = t.state==='done' ? '✓' : '';
  r.check.title = t.state==='done' ? 'mark not-done' : 'mark DONE (CEO, one click)';
  // text + meta (never clobber if the CEO is editing)
  setCleanText(r.text, t.text);
  r.badge.textContent=STLABEL[t.state]||t.state; r.badge.className='badge st-'+t.state;
  const uc=unreadCount(t);
  if(uc){ show(r.unread,true); r.unread.textContent=uc+' new'; r.unread.title=uc+' unread timeline update'+(uc>1?'s':''); }
  else show(r.unread,false);
  const canAttach=isAttachable(t.assignee);
  r.asgTag.textContent = t.assignee ? '@'+t.assignee : 'unassigned';
  r.asgTag.classList.toggle('attach', canAttach);
  r.asgTag.title = canAttach ? 'click to attach to '+t.assignee+'’s terminal' : '';
  show(r.ver, !!t.verified);
  // relations indicators (issue #3): blocked-by, subtask progress, child marker
  const kids=childrenOf(t.id), um=unmetDeps(t);
  let relHtml='';
  if(um.length) relHtml+=`<span class="rel blocked" title="blocked by ${um.length} unfinished prerequisite(s)">⛔ blocked by ${um.length}</span>`;
  if(kids.length){ const dn=kids.filter(k=>isTerminal(k.state)).length; relHtml+=`<span class="rel subs" title="${dn} of ${kids.length} subtasks done/cancelled">↳ ${dn}/${kids.length} subtasks</span>`; }
  if(t.parent&&board.tasks[t.parent]) relHtml+=`<span class="rel child" title="subtask of: ${esc(shortTitle(board.tasks[t.parent]))}">subtask</span>`;
  if(r.rels.innerHTML!==relHtml) r.rels.innerHTML=relHtml;
  r.ping.textContent='↑boss '+(t.pingsToBoss||0);
  // fields
  setClean(r.cond, t.doneCondition||'');
  if(r._pendWtd===undefined) r.toggle.classList.toggle('on', !!t.workToDone);   // don't clobber a pending (debouncing) toggle
  r.toggle.classList.toggle('disabled', !(t.doneCondition||'').trim());   // work-to-done still needs a done-condition (server-enforced)
  // brainstorm
  if((t.brainstorm||'').trim()){ show(r.brain,true); if(r.bsBody.textContent!==t.brainstorm) r.bsBody.textContent=t.brainstorm; } else show(r.brain,false);
  // needs-brainstorm banner (silent-no-op fix): a needs_brainstorm card must SURFACE, never sit silent
  show(r.needbrain, t.state==='needs_brainstorm');
  // status line
  if(t.lastStatus && t.state!=='done' && t.state!=='cancelled'){ show(r.status,true); const s='⚠ '+t.lastStatus; if(r.status.textContent!==s) r.status.textContent=s; } else show(r.status,false);
  // homepage proof previews: cap bulky image/video media; the issue-style card still shows every proof.
  const sig=(t.proofs||[]).map(p=>[p.id,p.type,p.ref,p.caption].join(':')).join(',');
  if(sig!==r.psig){
    r.proofList.innerHTML=homeProofsHtml(t.proofs);
    const more=r.proofList.querySelector('.proof.more');
    if(more) more.onclick=e=>{ e.preventDefault(); e.stopPropagation(); openCard(t.id); };
    r.psig=sig;
  }
}

function move(id,d){ const o=board.order.filter(x=>board.tasks[x]); const i=o.indexOf(id),j=i+d; if(j<0||j>=o.length)return; [o[i],o[j]]=[o[j],o[i]]; upd({op:'reorder',order:o}).then(pull); }

function add(){ const t=input.value.trim(); if(!t)return; input.value=''; upd({op:'add',text:t}).then(pull); }
document.getElementById('addBtn').onclick=add;
input.addEventListener('keydown',e=>{ if(e.key==='Enter') add(); });

// ── ISSUE-STYLE CARD VIEW (slice b) ───────────────────────────────────────────
// Clicking a task opens a modal with the full, durable message history for that task —
// GitHub-issue style: the opening event, then AI/engineer + CEO comments, status updates,
// state transitions, the brainstorm artifact, and image/video proofs, merged by timestamp.
// Re-renders live on every poll while open, so new activity streams in (composer is never
// clobbered — it lives outside the re-rendered region; dirty text + focus survive the tick).
let cardOpenId=null, _hashChecked=false;
const modal=document.getElementById('cardModal');
const cardTitle=document.getElementById('cardTitle'), cardSub=document.getElementById('cardSub');
const cardCond=document.getElementById('cardCond'), cardCondBody=document.getElementById('cardCondBody');
const cardArt=document.getElementById('cardArt'), cardArtBody=document.getElementById('cardArtBody');
const cardThread=document.getElementById('cardThread'), cardCompose=document.getElementById('cardCompose');
const cardQa=document.getElementById('cardQa'), cardState=document.getElementById('cardState'), cardRel=document.getElementById('cardRel');
// relations panel inside the opened card (issue #3): subtasks + 'blocked by' deps + hard-gate toggle.
// Signature-gated so live polls don't clobber a half-typed subtitle or reset the dependency picker.
function renderRelations(t){
  const kids=childrenOf(t.id), deps=(t.dependsOn||[]).map(id=>board.tasks[id]).filter(Boolean);
  const sig=JSON.stringify([t.hardGate,kids.map(k=>[k.id,k.state,k.text]),deps.map(d=>[d.id,d.state,d.text]),board.order.length]);
  if(cardRel._sig===sig){ show(cardRel,true); return; } cardRel._sig=sig;
  const badge=s=>`<span class="badge st-${s}" style="font-size:9px;padding:2px 7px">${esc(STLABEL[s]||s)}</span>`;
  const doneN=kids.filter(k=>isTerminal(k.state)).length;
  let html=`<div class="rel-sec"><span class="h">subtasks${kids.length?` · ${doneN}/${kids.length} done`:''}</span>`;
  html+= kids.length ? kids.map(k=>`<div class="rel-row"><a class="rel-link" data-open="${k.id}">↳ ${esc(shortTitle(k))}</a>${badge(k.state)}</div>`).join('')
                     : `<div class="rel-empty">No subtasks yet.</div>`;
  html+=`<div class="rel-add"><input id="relSubText" placeholder="new subtask title…" maxlength="240"><button id="relSubAdd">Add subtask</button></div></div>`;
  html+=`<div class="rel-sec"><span class="h">blocked by (dependencies)</span>`;
  html+= deps.length ? deps.map(d=>`<div class="rel-row"><a class="rel-link" data-open="${d.id}">${isTerminal(d.state)?'✓':'⛔'} ${esc(shortTitle(d))}</a>${badge(d.state)}<button class="rel-del" data-deldep="${d.id}" title="remove dependency">×</button></div>`).join('')
                      : `<div class="rel-empty">Not blocked by anything.</div>`;
  const opts=board.order.map(id=>board.tasks[id]).filter(x=>x&&x.id!==t.id&&!(t.dependsOn||[]).includes(x.id)&&x.parent!==t.id)
     .map(x=>`<option value="${x.id}">${esc(shortTitle(x))} — ${esc(STLABEL[x.state]||x.state)}</option>`).join('');
  html+=`<div class="rel-add"><select id="relDepSel"><option value="">add a dependency…</option>${opts}</select><button id="relDepAdd">Add</button></div></div>`;
  html+=`<div class="rel-sec"><label class="rel-gate"><span class="toggle${t.hardGate?' on':''}" id="relGate"><span class="sw"></span></span> hard gate — block entering “working” until prerequisites are done <span class="gate-hint">(off by default)</span></label></div>`;
  cardRel.innerHTML=html; show(cardRel,true);
  cardRel.querySelectorAll('[data-open]').forEach(a=>a.onclick=()=>openCard(a.dataset.open));
  const subText=cardRel.querySelector('#relSubText'), subAdd=cardRel.querySelector('#relSubAdd');
  if(subAdd) subAdd.onclick=()=>{ const v=(subText.value||'').trim(); if(!v)return; subAdd.disabled=true; upd({op:'add',text:v,parent:t.id}).then(pull); };
  if(subText) subText.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault(); subAdd.click();} };
  const depSel=cardRel.querySelector('#relDepSel'), depAdd=cardRel.querySelector('#relDepAdd');
  if(depAdd) depAdd.onclick=()=>{ const v=depSel.value; if(!v)return; upd({op:'set',id:t.id,dependsOn:[...(t.dependsOn||[]),v]}).then(pull); };
  cardRel.querySelectorAll('[data-deldep]').forEach(b=>b.onclick=()=>upd({op:'set',id:t.id,dependsOn:(t.dependsOn||[]).filter(x=>x!==b.dataset.deldep)}).then(pull));
  const gate=cardRel.querySelector('#relGate');
  if(gate) gate.onclick=()=>upd({op:'set',id:t.id,hardGate:!t.hardGate}).then(pull);
}
// manual status control: a dropdown on the card to move state back (e.g. review -> working) without editing JSON
cardState.innerHTML=STATES.map(s=>`<option value="${s}">${esc(STLABEL[s]||s)}</option>`).join('');
cardState.onchange=()=>{ const t=cardOpenId&&board.tasks[cardOpenId]; const v=cardState.value;
  if(!t||v===t.state) return;
  statusApi({id:cardOpenId,state:v,by:'CEO'}).then(r=>{ if(r&&r.error) alert(r.error); pull(); }); };

// brainstorm gate (slice d): render the interactive Q&A. Rebuilds ONLY when the server-side
// question/answer state changes (signature), so a half-typed answer + focus survive live polls.
function renderCardQa(t){
  if(t.state!=='needs_brainstorm'){ show(cardQa,false); cardQa._sig=null; return; }
  const qs=t.questions||[];
  const ua=qs.filter(q=>!(q.answer||'').trim()).length;
  const hasArt=!!(t.brainstorm||'').trim();
  const ready=ua===0 && (qs.length>0 || hasArt);
  show(cardQa,true);
  const sig=JSON.stringify({ask:t.brainstormAsked,art:hasArt,q:qs.map(q=>[q.id,!!(q.answer||'').trim()])});
  if(cardQa._sig===sig) return;                 // no server change -> don't clobber inputs/focus
  cardQa._sig=sig;
  let html='';
  if(qs.length){
    html += ua>0
      ? `<div class="qa-banner blocked">⚠ Not workable — ${ua} open question${ua>1?'s':''}. Answer to unblock this task.</div>`
      : `<div class="qa-banner ready">✓ All questions answered — ready to promote.</div>`;
    html += '<div class="qa-list">'+qs.map(q=>{
      const a=(q.answer||'').trim();
      return a
        ? `<div class="qa-item answered"><div class="q">${esc(q.q)}</div><div class="qa-ans">${esc(a)}</div></div>`
        : `<div class="qa-item" data-qid="${esc(q.id)}"><div class="q">${esc(q.q)}</div>`+
          `<div class="qa-ans-row"><textarea placeholder="Answer…"></textarea><button class="qa-ans-btn">Answer</button></div></div>`;
    }).join('')+'</div>';
  } else if(hasArt){
    html += `<div class="qa-banner ready">✓ Brainstormed — ready to promote to working.</div>`;
  } else {
    html += `<div class="qa-banner blocked">⌁ Brainstorming — generating clarifying questions for the CEO…</div>`;
  }
  if(ready) html += `<button class="qa-promote">Promote to working →</button>`;
  cardQa.innerHTML=html;
  cardQa.querySelectorAll('.qa-item[data-qid]').forEach(it=>{
    const qid=it.dataset.qid, ta=it.querySelector('textarea');
    const submit=()=>{ const v=ta.value.trim(); if(!v)return; answerApi({task_id:cardOpenId,qid,answer:v,by:'CEO'}).then(pull); };
    it.querySelector('.qa-ans-btn').onclick=submit;
    ta.onkeydown=e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); submit(); } };
  });
  const pb=cardQa.querySelector('.qa-promote');
  if(pb) pb.onclick=()=>brainstormApi({id:cardOpenId,promote:'working'}).then(pull);
}

function reltime(ts){ if(!ts)return''; const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return s+'s ago'; const m=Math.floor(s/60); if(m<60)return m+'m ago';
  const h=Math.floor(m/60); if(h<24)return h+'h ago'; const d=Math.floor(h/24);
  return d<7? d+'d ago' : new Date(ts).toLocaleDateString(); }
function evClass(by,kind){ if(kind==='brainstorm')return'brain'; return (by||'').toLowerCase()==='ceo'?'ceo':'agent'; }
function byLabel(by){ if(!by)return'system'; if(by.toLowerCase()==='ceo')return'CEO'; if(by==='brainstorm')return'Brainstorm'; return by; }
function initials(by){ if(!by)return'•'; if(by.toLowerCase()==='ceo')return'CEO'; if(by==='brainstorm')return'BR';
  const tail=by.split('/').pop().split(':').pop(); return (tail||by).replace(/[^a-z0-9]/gi,'').slice(0,2).toUpperCase()||'•'; }

function evHtml(it){
  // compact centered markers: opened, state transitions, brainstorm-saved.
  // (the brainstorm artifact's full text is pinned above the thread, so the timeline
  //  only marks WHEN it was saved/updated — no duplicated wall of text.)
  if(it.kind==='state'||it.kind==='opened'||it.kind==='brainstorm'){
    const txt = it.kind==='opened' ? 'opened this task'
              : it.kind==='brainstorm' ? `brainstorm artifact saved by ${esc(byLabel(it.by))}`
              : esc(it.body);
    return `<div class="ev state"><span class="ev-text">⌁ ${txt} · ${reltime(it.ts)}</span></div>`;
  }
  let body;
  if(it.kind==='proof'){
    body=(it.body?`<div class="ev-text">${esc(it.body)}</div>`:'')+`<div class="ev-proofs">${proofChip(it.proof)}</div>`;
  }else{ body=`<div class="ev-text">${esc(it.body)}</div>`; }
  const kindLbl = it.kind==='comment' ? '' : `<span class="ev-kind">${esc(it.kind)}</span>`;
  return `<div class="ev ev-${it.kind}"><div class="av ${evClass(it.by,it.kind)}">${esc(initials(it.by))}</div>`+
    `<div class="ev-body"><div class="ev-hd"><span class="ev-by">${esc(byLabel(it.by))}</span>${kindLbl}`+
    `<span class="ev-time">${reltime(it.ts)}</span></div>${body}</div></div>`;
}

// Re-render is INCREMENTAL and non-disruptive: the live poll must never yank the modal to the top
// or steal focus from the composer. We only touch a region when its data actually changed, and the
// thread is APPEND-ONLY (new events are added to the end; existing nodes — and their images — are
// never rebuilt). So scrollTop holds and the composer's focus/caret/typed text survive every tick.
function renderCard(){
  if(!cardOpenId) return;
  const t=board.tasks[cardOpenId];
  if(!t){ closeCard(); return; }                 // task deleted while open
  const title=t.text||'(untitled)';
  if(cardTitle.textContent!==title) cardTitle.textContent=title;
  // sub-header: rebuild ONLY when a displayed field changes (avoids per-tick reflow/focus churn)
  const canAttach=isAttachable(t.assignee);
  const subSig=JSON.stringify([t.state,t.assignee,t.workToDone,t.verified,canAttach]);
  if(cardSub._sig!==subSig){ cardSub._sig=subSig;
    cardSub.innerHTML=`<span class="badge st-${t.state}">${esc(STLABEL[t.state]||t.state)}</span>`+
      `<span class="tag${canAttach?' attach':''}"${canAttach?` data-attach="${esc(t.assignee)}" title="click to attach to ${esc(t.assignee)}’s terminal"`:''}>`+
      `${t.assignee?'@'+esc(t.assignee):'unassigned'}</span>`+
      (t.workToDone?'<span class="tag">work → done</span>':'')+
      (t.verified?'<span class="badge st-done">verified</span>':'')+
      `<span class="card-id">#${esc(cardOpenId)}</span>`;
  }
  if(document.activeElement!==cardState && cardState.value!==t.state) cardState.value=t.state;   // keep the status control in sync (don't fight the CEO mid-select)
  if((t.doneCondition||'').trim()){ if(cardCondBody.textContent!==t.doneCondition) cardCondBody.textContent=t.doneCondition; show(cardCond,true); } else show(cardCond,false);
  renderCardQa(t);                                // brainstorm gate (slice d), already signature-gated
  if((t.brainstorm||'').trim()){ if(cardArtBody.textContent!==t.brainstorm) cardArtBody.textContent=t.brainstorm; show(cardArt,true); } else show(cardArt,false);
  renderRelations(t);                             // subtasks + dependencies panel (issue #3)
  // thread: append only the events not already in the DOM (keyed) — never rebuild existing nodes
  const items=[{key:'opened',ts:t.created,kind:'opened',by:'CEO',body:''}];
  (t.comments||[]).forEach(c=>items.push({key:'c:'+c.id,ts:c.ts,kind:c.kind,by:c.by,body:c.body}));
  (t.proofs||[]).forEach(p=>items.push({key:'p:'+p.id,ts:p.ts,kind:'proof',by:p.by,body:p.caption||'',proof:p}));
  items.sort((a,b)=>(a.ts||0)-(b.ts||0));
  markTaskRead(cardOpenId);
  const have=new Set([...cardThread.children].map(n=>n.dataset.k));
  const nearBottom=(modal.scrollHeight-modal.scrollTop-modal.clientHeight)<60;
  let added=false;
  items.forEach(it=>{ if(have.has(it.key))return;
    const tmp=document.createElement('div'); tmp.innerHTML=evHtml(it); const node=tmp.firstElementChild;
    if(node){ node.dataset.k=it.key; cardThread.appendChild(node); added=true; } });
  // appended events sit BELOW the viewport, so scrollTop is unaffected; only auto-follow if the
  // CEO was already at the bottom (don't yank him up if he's reading/scrolled mid-thread)
  if(added && nearBottom) modal.scrollTop=modal.scrollHeight;
}

function openCard(id){ if(!board.tasks[id])return; cardOpenId=id; modal.classList.add('show');
  document.body.style.overflow='hidden'; cardCompose.value='';
  cardThread.innerHTML=''; cardSub._sig=null; cardQa._sig=null; cardRel._sig=null; modal.scrollTop=0;   // fresh render for this card
  markTaskRead(id);
  renderCard();
  if(location.hash!=='#card/'+id){ try{history.replaceState(null,'','#card/'+id);}catch(e){ location.hash='card/'+id; } } }
function closeCard(){ cardOpenId=null; modal.classList.remove('show'); document.body.style.overflow=''; cardCompose.value='';
  if(/^#card\//.test(location.hash||'')){ try{history.replaceState(null,'',location.pathname+location.search);}catch(e){ location.hash=''; } } }
// deep link: #card/<id> opens that card directly (the WhatsApp ping links straight to the card)
function checkHash(){ const m=(location.hash||'').match(/^#card\/([a-z0-9]+)$/i);
  if(m && board.tasks[m[1]] && cardOpenId!==m[1]) openCard(m[1]); }
window.addEventListener('hashchange',checkHash);
function postComment(){ const v=cardCompose.value.trim(); if(!v||!cardOpenId)return;
  cardCompose.value=''; commentApi({task_id:cardOpenId,body:v,by:'CEO'}).then(pull); }

document.getElementById('cardClose').onclick=closeCard;
cardSub.onclick=e=>{ const c=e.target.closest('.tag.attach'); if(c&&c.dataset.attach) attachToEngineer(c.dataset.attach); };
document.getElementById('cardCommentBtn').onclick=postComment;
cardCompose.onkeydown=e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); postComment(); } };
modal.onclick=e=>{ if(e.target===modal) closeCard(); };          // click backdrop to close
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&cardOpenId) closeCard(); });

function clock(){ const d=new Date(); document.getElementById('clock').textContent=d.toLocaleTimeString(); }
setInterval(clock,1000); clock();
initViewbar(); renderViewbar();   // build + restore the filter/sort controls before first paint
setInterval(pull,1000); pull();   // 1s live poll, incremental — no reload, dirty fields preserved
input.focus();
</script>
</body>
</html>
