<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mypeople — HUD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --midnight:#01000A; --volt:#D5EF8A; --grove:#5e7a5e; --iris:#C4BFFF;
  --dark-bg:#111110; --dark-border:rgba(255,255,255,0.09);
  --text-dark:#F0F0E8; --muted-dark:rgba(240,240,232,0.45);
  --success:#34c759; --danger:#ff3b30; --warning:#febc2e; --info:#5ac8fa;
  --volt-dim:rgba(213,239,138,0.15); --volt-glow:rgba(213,239,138,0.25);
  --surface:rgba(255,255,255,0.05); --surface2:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --serif:'Instrument Serif',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif; --mono:'DM Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--dark-bg);color:var(--text-dark);font-family:var(--sans);font-weight:300;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;z-index:9999}
.wrap{max-width:1320px;margin:0 auto;padding:44px 52px 80px;position:relative;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;gap:28px;padding-bottom:24px;border-bottom:1px solid var(--dark-border);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:16px}
.mark{width:52px;height:52px;border-radius:12px;background:var(--volt);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.mark span{font-family:var(--serif);font-size:34px;color:var(--grove);line-height:1}
h1{font-family:var(--serif);font-weight:400;font-size:clamp(30px,3.4vw,48px);letter-spacing:-.02em;line-height:1}
h1 em{font-style:italic;color:rgba(240,240,232,.55)}
.subt{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-dark);margin-top:6px}
.hdr-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.live-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--volt);background:rgba(213,239,138,.10);border:1px solid rgba(213,239,138,.45);padding:5px 13px;border-radius:100px;text-shadow:0 0 10px rgba(213,239,138,.28)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--volt);box-shadow:0 0 8px var(--volt);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.xnav{font-family:var(--sans);font-weight:600;font-size:13px;color:var(--midnight);background:var(--volt);border:none;border-radius:11px;padding:9px 18px;cursor:pointer;text-decoration:none;white-space:nowrap}
.xnav:hover{filter:brightness(1.06);box-shadow:0 4px 20px var(--volt-glow)}
.meta{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--muted-dark);margin:18px 0 6px}
.meta b{color:var(--text-dark);font-weight:500}
section{margin-top:34px}
.sec-h{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-dark);padding-bottom:10px;border-bottom:1px solid var(--dark-border);margin-bottom:18px}
/* ── machines grid (§7.1) ──────────────────────────────────────────── */
.group{margin-bottom:30px}
.group-h{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.group-name{font-family:var(--serif);font-size:26px;letter-spacing:-.01em}
.group-count{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--volt);background:var(--volt-dim);border:1px solid rgba(213,239,138,.4);border-radius:100px;padding:3px 12px;letter-spacing:.06em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.node{background:var(--surface);border:1px solid var(--dark-border);border-radius:16px;padding:18px 20px;display:flex;flex-direction:column;gap:9px}
.node .type{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-dark)}
.node .machine{font-family:var(--serif);font-size:24px;line-height:1.05;letter-spacing:-.01em;word-break:break-all}
.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.state{font-family:var(--mono);font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;border-radius:100px;padding:3px 11px}
.state-hydrating{color:var(--volt);background:var(--volt-dim);border:1px solid rgba(213,239,138,.5);animation:pulse 1.6s ease-in-out infinite}
.state-ready{color:#52d873;background:rgba(52,199,89,.16);border:1px solid rgba(52,199,89,.4)}
.state-failed{color:var(--danger);background:rgba(255,59,48,.16);border:1px solid rgba(255,59,48,.45)}
.alive{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;color:#52d873}
.dead{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--danger)}
.attach{font-family:var(--mono);font-size:11.5px;color:var(--info);text-decoration:none;border:1px solid rgba(90,200,250,.4);border-radius:8px;padding:5px 10px}
.attach:hover{color:var(--volt);border-color:var(--volt);background:var(--volt-dim)}
.rec{font-family:var(--mono);font-size:11.5px;color:var(--volt);text-decoration:none;border:1px solid rgba(213,239,138,.4);border-radius:8px;padding:5px 10px}
.rec:hover{background:var(--volt-dim)}
.muted{font-family:var(--mono);font-size:11px;color:var(--muted-dark)}
/* ── agents table ──────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-family:var(--sans);font-size:14px}
th{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-dark);text-align:left;padding:8px 14px;border-bottom:1px solid var(--dark-border)}
td{padding:11px 14px;border-bottom:1px solid var(--dark-border);vertical-align:top}
td.aid{font-family:var(--mono);font-size:12.5px;color:var(--text-dark)}
.st-alive{color:var(--volt);font-weight:600}
.st-dead{color:var(--danger)}
.bk{font-family:var(--mono);font-size:11px;color:var(--muted-dark)}
.sumc{color:var(--muted-dark);max-width:420px}
.btn-revive{font-family:var(--sans);font-weight:700;font-size:12px;color:var(--midnight);background:var(--volt);border:none;border-radius:9px;padding:6px 14px;cursor:pointer}
.btn-revive:hover{filter:brightness(1.07);box-shadow:0 3px 14px var(--volt-glow)}
.empty{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--muted-dark);padding:26px 4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="mark"><span>p</span></div>
      <div>
        <h1>mypeople <em>— HUD</em></h1>
        <div class="subt">fleet control · live</div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="live-pill"><span class="live-dot"></span><span id="livetxt">live</span></span>
      <a class="xnav" id="todolink" href="#">TODO ↗</a>
    </div>
  </header>

  <div class="meta">refreshed <b id="reft">—</b> · <b id="ccount">0</b> machines · <b id="acount">0</b> agents</div>

  <section>
    <div class="sec-h">Machines — grouped by purpose</div>
    <div id="grid"></div>
  </section>

  <section>
    <div class="sec-h">Agents</div>
    <div id="agents"></div>
  </section>

  <section>
    <div class="sec-h">Retired engineers</div>
    <div id="retired"></div>
  </section>
</div>

<script>
const SECRET = "__INJECT_SECRET__";
const H = (SECRET && !SECRET.startsWith('__')) ? {'X-Queue-Secret':SECRET} : {};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const j = async p => { const r = await fetch(p,{headers:H}); if(!r.ok) throw new Error(p+' '+r.status); return r.json(); };
const TYPELBL = {'one-shot-eng':'one-shot eng','long-lived-eng':'long-lived eng','system-agent':'always-running system agent','in-substrate-install-eng':'in-substrate install eng'};
const ALIVE_WINDOW = 30; // seconds since last_seen → alive

document.getElementById('todolink').href = 'http://'+location.hostname+':9933/';

function alive(last){ return last && (Date.now()/1000 - last) < ALIVE_WINDOW; }

function renderGrid(clients){
  const groups = {};
  for(const c of clients){ const p = c.purpose || 'unknown'; (groups[p] = groups[p]||[]).push(c); }
  const el = document.getElementById('grid');
  if(!clients.length){ el.innerHTML = '<div class="empty">no machines connected</div>'; return; }
  el.innerHTML = Object.keys(groups).sort().map(p=>{
    const nodes = groups[p];
    const cards = nodes.map(c=>{
      const st = (c.state||'ready').toLowerCase();
      const stCls = st==='hydrating'?'state-hydrating':st==='failed'?'state-failed':'state-ready';
      const lv = alive(c.last_seen);
      const att = c.attach_base ? `<a class="attach" target="_blank" href="${esc(c.attach_base)}/?arg=-t&arg=mc-main:Boss">ATTACH BOSS ↗</a>` : '<span class="muted">no attach</span>';
      const rec = c.recording_url ? `<a class="rec" target="_blank" href="${esc(c.recording_url)}">RECORDING ↗</a>` : '';
      return `<div class="node">
        <div class="type">${esc(TYPELBL[c.node_type]||c.node_type||'node')}</div>
        <div class="machine">${esc(c.hostname)}</div>
        <div class="row"><span class="state ${stCls}">${esc(st)}</span><span class="${lv?'alive':'dead'}">${lv?'ALIVE':'DEAD'}</span></div>
        <div class="row">${att}${rec}</div>
      </div>`;
    }).join('');
    return `<div class="group"><div class="group-h"><span class="group-name">${esc(p)}</span><span class="group-count">${p} hydration · ${nodes.length}</span></div><div class="grid">${cards}</div></div>`;
  }).join('');
}

function renderAgents(agents){
  const el = document.getElementById('agents');
  if(!agents.length){ el.innerHTML = '<div class="empty">no agents</div>'; return; }
  el.innerHTML = `<table><thead><tr><th>Agent ID</th><th>State</th><th>Backend</th><th>Boss</th><th>Summary</th><th>Attach</th></tr></thead><tbody>`+
    agents.map(a=>{
      const lv = (a.state||'')==='alive';
      const att = a.tmux_target && a.attach_base!==null ? `<a class="attach" target="_blank" href="${esc(a.attach_base||('http://'+location.hostname+':7681'))}/?arg=-t&arg=${esc(a.tmux_target)}">ATTACH ↗</a>` : '';
      return `<tr><td class="aid">${esc(a.agent_id)}</td><td class="${lv?'st-alive':'st-dead'}">${esc(a.state||'?')}</td><td class="bk">${esc(a.backend||'')}</td><td class="bk">${esc(a.boss_id||'')}</td><td class="sumc">${esc(a.summary||'')}</td><td>${att}</td></tr>`;
    }).join('')+`</tbody></table>`;
}

function renderRetired(roster){
  const ret = (roster||[]).filter(r=>r.retired);
  const el = document.getElementById('retired');
  if(!ret.length){ el.innerHTML = '<div class="empty">none retired</div>'; return; }
  el.innerHTML = `<table><thead><tr><th>Agent ID</th><th>Summary</th><th>Last seen</th><th></th></tr></thead><tbody>`+
    ret.map(r=>`<tr><td class="aid">${esc(r.agent_id)}</td><td class="sumc">${esc(r.summary||'')}</td><td class="bk">${r.last_seen?new Date(r.last_seen*1000).toLocaleTimeString():''}</td><td><button class="btn-revive" onclick="revive('${esc(r.agent_id)}')">Revive</button></td></tr>`).join('')+`</tbody></table>`;
}

async function revive(id){
  try{ await fetch('/revive',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({agent_id:id})}); pull(); }
  catch(e){ alert('revive failed: '+e.message); }
}

async function pull(){
  try{
    const [clients, agentsRaw, roster] = await Promise.all([j('/clients'), j('/agents'), j('/roster').catch(()=>[])]);
    const agents = Array.isArray(agentsRaw) ? agentsRaw : (agentsRaw.agents||[]);
    renderGrid(clients); renderAgents(agents); renderRetired(roster);
    document.getElementById('ccount').textContent = clients.length;
    document.getElementById('acount').textContent = agents.length;
    document.getElementById('reft').textContent = new Date().toLocaleTimeString();
    document.getElementById('livetxt').textContent = 'live';
  }catch(e){ document.getElementById('livetxt').textContent = 'stale'; }
}
pull(); setInterval(pull, 3000);
</script>
</body>
</html>
